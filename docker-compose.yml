services:
  opencode:
    build: .
    container_name: opencode
    restart: unless-stopped
    stop_grace_period: 10s
    security_opt:
      - no-new-privileges:true

    ports:
      - "4096:4096"

    volumes:
      # Your project source code (bind mount).
      - ./workspace:/workspace
      # Config directory — entrypoint creates a default opencode.jsonc on first run.
      - ./config:/home/appuser/.config/opencode
      # Persistent data: sessions, auth tokens, logs, and project storage.
      - ./data:/home/appuser/.local/share/opencode

    environment:
      # Match the container user to your host UID/GID so bind mounts have correct ownership.
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"

      # Authentication (recommended for remote access)
      OPENCODE_SERVER_USERNAME: "${OPENCODE_SERVER_USERNAME:-opencode}"
      OPENCODE_SERVER_PASSWORD: "${OPENCODE_SERVER_PASSWORD:-password}"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4096/global/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
