name: Build and Publish Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '0 6 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT || github.token }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set package visibility to public
        env:
          TOKEN: ${{ secrets.GHCR_PAT || github.token }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          token = os.environ.get('TOKEN', '')
          pkg_name = "${{ github.repository_owner }}%2F${{ github.event.repository.name }}"
          url = f"https://api.github.com/user/packages/container/{pkg_name}"

          data = json.dumps({"visibility": "public"}).encode()
          req = urllib.request.Request(url, data=data, method="PATCH")
          req.add_header("Authorization", f"Bearer {token}")
          req.add_header("Accept", "application/vnd.github+json")
          req.add_header("Content-Type", "application/json")

          try:
              resp = urllib.request.urlopen(req)
              body = json.loads(resp.read())
              print(f"Success (HTTP {resp.status}): visibility is now '{body.get('visibility')}'")
          except urllib.error.HTTPError as e:
              err_body = e.read().decode()
              print(f"FAILED (HTTP {e.code}): {err_body}")
              raise SystemExit(1)
          PYEOF
